name: Rust CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # Sibling deps: ladybug-rs (for ladybug-contract path dependency)
      - name: Clone ladybug-rs (sibling dependency)
        run: git clone --depth 1 https://github.com/AdaWorldAPI/ladybug-rs.git ../ladybug-rs

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        env:
          # Mirror ladybug-rs: allow noise lints in evolving codebase
          CLIPPY_ALLOWS: >
            -A unused -A dead-code
            -A clippy::derivable-impls -A clippy::field-reassign-with-default
            -A clippy::type-complexity -A clippy::redundant-closure
            -A clippy::module-inception -A clippy::collapsible-if
            -A clippy::collapsible-match -A clippy::or-fun-call
            -A clippy::new-without-default -A clippy::result-large-err
            -A clippy::missing-const-for-thread-local -A clippy::if-same-then-else
            -A clippy::manual-is-multiple-of -A clippy::redundant-pattern-matching
            -A clippy::manual-range-contains
            -A clippy::option-map-or-none -A clippy::needless-borrows-for-generic-args
            -A clippy::useless-vec -A clippy::manual-strip
            -A clippy::unnecessary-unwrap -A clippy::double-ended-iterator-last
            -A clippy::single-char-add-str -A clippy::manual-map
            -A clippy::useless-format -A clippy::unnecessary-get-then-check
            -A clippy::collapsible-str-replace -A clippy::unnecessary-map-or
            -A clippy::unwrap-or-default -A clippy::unnecessary-lazy-evaluations
            -A clippy::default-constructed-unit-structs -A clippy::assign-op-pattern
            -A clippy::let-underscore-future -A clippy::manual-pattern-char-comparison
        run: cargo clippy --all-targets -- -D warnings $CLIPPY_ALLOWS

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Clone ladybug-rs (sibling dependency)
        run: git clone --depth 1 https://github.com/AdaWorldAPI/ladybug-rs.git ../ladybug-rs

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --all-targets

  miri:
    name: Miri (unsafe validation)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Clone ladybug-rs (sibling dependency)
        run: git clone --depth 1 https://github.com/AdaWorldAPI/ladybug-rs.git ../ladybug-rs

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: miri

      # 5 min timeout — Miri can run 1-3h without it
      - name: Miri — lib tests (5 min timeout)
        run: timeout 300 cargo miri test --lib -- --test-threads=1
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation"
        continue-on-error: true
