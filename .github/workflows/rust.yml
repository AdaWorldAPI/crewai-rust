name: Rust CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # Sibling deps: ladybug-rs (for ladybug-contract path dependency)
      - name: Clone ladybug-rs (sibling dependency)
        run: git clone --depth 1 https://github.com/AdaWorldAPI/ladybug-rs.git ../ladybug-rs

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Clone ladybug-rs (sibling dependency)
        run: git clone --depth 1 https://github.com/AdaWorldAPI/ladybug-rs.git ../ladybug-rs

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --all-targets

  miri:
    name: Miri (unsafe validation)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Clone ladybug-rs (sibling dependency)
        run: git clone --depth 1 https://github.com/AdaWorldAPI/ladybug-rs.git ../ladybug-rs

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: miri

      # 5 min timeout — Miri can run 1-3h without it
      - name: Miri — lib tests (5 min timeout)
        run: timeout 300 cargo miri test --lib -- --test-threads=1
        env:
          MIRIFLAGS: "-Zmiri-disable-isolation"
        continue-on-error: true
